version: 2
updates:
  # Keep NuGet packages current (main app + test projects).
  - package-ecosystem: "nuget"
    directory: "/SysManager/SysManager"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
      include: "scope"
    # Group minor+patch bumps into one PR; keep majors separate for careful review.
    groups:
      nuget-minor-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "nuget"
    directory: "/SysManager/SysManager.Tests"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "tests"
    commit-message:
      prefix: "deps(tests)"
      include: "scope"
    groups:
      nuget-minor-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "nuget"
    directory: "/SysManager/SysManager.UITests"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "tests"
    commit-message:
      prefix: "deps(uitests)"
      include: "scope"
    groups:
      nuget-minor-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "nuget"
    directory: "/SysManager/SysManager.IntegrationTests"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "tests"
    commit-message:
      prefix: "deps(integration)"
      include: "scope"
    groups:
      nuget-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Keep GitHub Actions current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
    # Group all action bumps into one PR — they're low-risk and SHA-pinned.
    groups:
      github-actions:
        update-types:
          - "minor"
          - "patch"
