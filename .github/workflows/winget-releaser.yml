# Automatically submit new releases to winget-pkgs
# Triggers on every published GitHub Release and creates a PR on microsoft/winget-pkgs

name: Winget Releaser

on:
  release:
    types: [released]
  workflow_dispatch:
    inputs:
      release-tag:
        description: "Release tag to submit (e.g. v1.12.0)"
        required: true

jobs:
  winget-update:
    name: Update winget package
    runs-on: ubuntu-latest
    steps:
      - uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: laurentiu021.SysManager
          installers-regex: '\.exe$'
          release-tag: ${{ inputs.release-tag || github.event.release.tag_name }}
          token: ${{ secrets.WINGET_TOKEN }}
