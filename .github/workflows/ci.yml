name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & unit tests
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: |
          dotnet restore SysManager/SysManager/SysManager.csproj
          dotnet restore SysManager/SysManager.Tests/SysManager.Tests.csproj
          dotnet restore SysManager/SysManager.IntegrationTests/SysManager.IntegrationTests.csproj
          dotnet restore SysManager/SysManager.UITests/SysManager.UITests.csproj

      # Format-check every C# project the workflow builds, not just the main one —
      # the same .editorconfig governs the test projects, so otherwise their style
      # could drift past CI silently.
      - name: Check formatting
        run: |
          dotnet format SysManager/SysManager/SysManager.csproj --verify-no-changes --verbosity diagnostic
          dotnet format SysManager/SysManager.Tests/SysManager.Tests.csproj --verify-no-changes --verbosity diagnostic
          dotnet format SysManager/SysManager.IntegrationTests/SysManager.IntegrationTests.csproj --verify-no-changes --verbosity diagnostic
          dotnet format SysManager/SysManager.UITests/SysManager.UITests.csproj --verify-no-changes --verbosity diagnostic

      - name: Build (Release)
        run: dotnet build SysManager/SysManager/SysManager.csproj -c Release --no-restore

      - name: Build tests
        run: dotnet build SysManager/SysManager.Tests/SysManager.Tests.csproj -c Release --no-restore

      # Compile-check the integration tests so ViewModel/service signature drift is
      # caught in CI. They are NOT run here (they touch the live system); compilation
      # alone catches the constructor/property mismatches that previously slipped by.
      - name: Build integration tests (compile check)
        run: dotnet build SysManager/SysManager.IntegrationTests/SysManager.IntegrationTests.csproj -c Release --no-restore

      - name: Run unit tests
        run: >
          dotnet test SysManager/SysManager.Tests/SysManager.Tests.csproj
          -c Release --no-build
          --logger "trx;LogFileName=unit-results.trx"
          --collect:"XPlat Code Coverage"
          --results-directory TestResults

      # Skip Codecov on fork PRs: forked pull requests have no access to repository
      # secrets, so CODECOV_TOKEN is empty there and the upload would fail noisily for
      # no benefit. Same-repo pushes/PRs upload normally.
      - name: Upload coverage to Codecov
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unittests
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        if: ${{ !cancelled() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          files: TestResults/**/unit-results.trx

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-results
          path: TestResults/**
          retention-days: 14

  ui-tests:
    name: UI automation tests
    runs-on: windows-latest
    needs: build-and-test
    timeout-minutes: 30
    # UI tests need a desktop session; windows-latest provides one.
    # Skip on PRs from forks, since secrets won't be available anyway.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore SysManager/SysManager.UITests/SysManager.UITests.csproj

      - name: Build UI tests
        run: dotnet build SysManager/SysManager.UITests/SysManager.UITests.csproj -c Release

      - name: Run UI tests
        id: ui-tests
        run: >
          dotnet test SysManager/SysManager.UITests/SysManager.UITests.csproj
          -c Release --no-build
          --logger "trx;LogFileName=ui-results.trx"
          --results-directory TestResults
        continue-on-error: true

      # TEST-005: Surface UI test failures as a visible PR annotation
      - name: Annotate UI test failures
        if: steps.ui-tests.outcome == 'failure'
        run: echo "::warning::UI automation tests failed — review test results artifact for details."

      - name: Upload UI test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ui-test-results
          path: TestResults/**
          retention-days: 14
