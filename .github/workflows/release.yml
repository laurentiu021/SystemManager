name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.5.3)"
        required: true

permissions:
  contents: write
  discussions: write

# Serialize releases per tag so two pushes (or a tag push racing a manual dispatch)
# can't run two release jobs that race the winget publish and Discussions post.
# Never cancel an in-flight release — a half-published release is worse than a wait.
concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  guard:
    name: Skip if release already exists (tag move / re-push)
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - name: Check for an existing release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Manual dispatch is an explicit, intentional request — always allow it.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch — proceeding."
            exit 0
          fi
          tag="${{ github.ref_name }}"
          # A push event fires both for brand-new tags AND for moved/re-pushed tags.
          # A brand-new release has no GitHub Release yet; a moved tag already does.
          # Only release when none exists, so moving old tags can't re-trigger a
          # full release (which would hijack the "Latest" flag and flood Discussions).
          if gh release view "$tag" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Release for $tag already exists — skipping (tag move or re-push)."
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "No release for $tag yet — proceeding."
          fi

  build-and-release:
    name: Build single-file exe & publish release
    needs: guard
    if: needs.guard.outputs.should_release == 'true'
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 10.0.x

      - name: Extract tag version
        id: version
        shell: pwsh
        env:
          # Pass the tag through the environment instead of interpolating ${{ }} directly
          # into the script body — that avoids any script-injection from a crafted manual
          # dispatch input and keeps the value as plain data.
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          $tag = if ($env:EVENT_NAME -eq "workflow_dispatch") { $env:INPUT_TAG } else { $env:REF_NAME }
          # Validate the tag shape (vMAJOR.MINOR.PATCH) before using it anywhere.
          # End-anchored ($) so a crafted tag can't append trailing content that
          # slips past the guard on this privileged (contents/discussions: write) workflow.
          if ($tag -notmatch '^v[0-9]+\.[0-9]+\.[0-9]+$') {
            Write-Error "Invalid release tag '$tag' — expected a semver tag like v1.2.3."
            exit 1
          }
          $version = $tag -replace '^v', ''
          "tag=$tag"          | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$version"  | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Building version $version from tag $tag"

      - name: Restore
        run: dotnet restore SysManager/SysManager/SysManager.csproj

      - name: Run unit tests (must pass)
        run: >
          dotnet test SysManager/SysManager.Tests/SysManager.Tests.csproj
          -c Release
          --logger "trx;LogFileName=unit-results.trx"
          --results-directory TestResults

      - name: Publish single-file exe
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          ./publish.ps1 -Configuration Release -Runtime win-x64 -Output publish -Version $ver

      - name: Rename exe with version
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          $src = "publish/SysManager.exe"
          $newName = "SysManager-v${ver}.exe"
          if (-not (Test-Path $src)) { throw "Missing $src" }
          Rename-Item $src -NewName $newName
          Write-Host "Renamed to publish/$newName"

      - name: Compute SHA256
        id: hash
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          $exe = "publish/SysManager-v${ver}.exe"
          if (-not (Test-Path $exe)) { throw "Missing $exe" }
          $hash = (Get-FileHash $exe -Algorithm SHA256).Hash
          $hashFile = "publish/SysManager-v${ver}.exe.sha256"
          "$hash *SysManager-v${ver}.exe" | Out-File -FilePath $hashFile -Encoding ascii -NoNewline
          "hash=$hash" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "SHA256: $hash"

      - name: Extract release notes from CHANGELOG
        id: notes
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $changelog = Get-Content CHANGELOG.md -Raw
          # Grab the block for this version (between its header and the next "## [" header or EOF).
          $pattern = "(?ms)^## \[$([regex]::Escape($version))\].*?(?=^## \[|\z)"
          $match = [regex]::Match($changelog, $pattern)
          $notesPath = "release-notes.md"
          if (-not $match.Success) {
              # Fail loud: a release with no CHANGELOG entry would otherwise ship a
              # generic "see CHANGELOG" placeholder. Stop here so the missing entry
              # is added before the release is published.
              throw "No CHANGELOG.md entry found for version $version. Add a '## [$version] - <date>' section before releasing."
          }
          $body = $match.Value.Trim()
          if ($body -match "(?m)^## \[$([regex]::Escape($version))\].*$\s*\z") {
              # Header exists but the section is empty (no notes beneath it).
              throw "CHANGELOG.md entry for version $version is empty. Add release notes under the '## [$version]' header before releasing."
          }
          $body | Out-File -FilePath $notesPath -Encoding utf8
          "path=$notesPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Append verification instructions to release notes
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          $hash = "${{ steps.hash.outputs.hash }}"
          Add-Content release-notes.md "`n`n---`n`n### Verify the download`n`n``````powershell`nGet-FileHash .\SysManager-v${ver}.exe -Algorithm SHA256`n```````n`nExpected SHA256: ``$hash``"

      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: SysManager ${{ steps.version.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          files: |
            publish/SysManager-v${{ steps.version.outputs.version }}.exe
            publish/SysManager-v${{ steps.version.outputs.version }}.exe.sha256

      - name: Update winget package
        uses: vedantmgoyal9/winget-releaser@4ffc7888bffd451b357355dc214d43bb9f23917e # v2
        with:
          identifier: laurentiu021.SysManager
          installers-regex: '\.exe$'
          release-tag: ${{ steps.version.outputs.tag }}
          token: ${{ secrets.WINGET_TOKEN }}

      - name: Post announcement to Discussions
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const fs = require('fs');
            const version = '${{ steps.version.outputs.version }}';
            const tag = '${{ steps.version.outputs.tag }}';
            const notes = fs.readFileSync('release-notes.md', 'utf8');
            const releaseUrl = '${{ steps.release.outputs.url }}';

            // Find the Announcements discussion category
            const query = `
              query($owner: String!, $repo: String!) {
                repository(owner: $owner, name: $repo) {
                  discussionCategories(first: 20) {
                    nodes { id name }
                  }
                }
              }`;
            const result = await github.graphql(query, {
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const categories = result.repository.discussionCategories.nodes;
            const cat = categories.find(c => c.name === 'Announcements');
            if (!cat) { console.log('Announcements category not found, skipping.'); return; }

            const repoQuery = `
              query($owner: String!, $repo: String!) {
                repository(owner: $owner, name: $repo) { id }
              }`;
            const repoResult = await github.graphql(repoQuery, {
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const mutation = `
              mutation($repoId: ID!, $catId: ID!, $title: String!, $body: String!) {
                createDiscussion(input: {
                  repositoryId: $repoId,
                  categoryId: $catId,
                  title: $title,
                  body: $body
                }) { discussion { url } }
              }`;
            const title = `SysManager ${version} released`;
            const body = `## SysManager ${version} is out!\n\n[Download from GitHub Releases](${releaseUrl})\n\n${notes}`;
            await github.graphql(mutation, {
              repoId: repoResult.repository.id,
              catId: cat.id,
              title,
              body,
            });
            console.log(`Discussion posted for ${version}`);
